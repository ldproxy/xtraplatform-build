
steps:
  clone-xtraplatform:
    image: woodpeckerci/plugin-git
    settings:
      remote: https://github.com/ldproxy/xtraplatform.git
      branch: master
      path: ../xtraplatform
      ref: refs/heads/master
      sha: ''
    when:
      event: [ push ]
      branch: [ renovate-* ]

  test-xtraplatform:
    image: eclipse-temurin:25@sha256:bee2e23ab444ed60daf8123e36478bc4a286ba7835bec6f9daf9eba1d50a86a2
    commands:
      - export GRADLE_USER_HOME=$${DRONE_WORKSPACE}/.gradle
      - cd ../xtraplatform
      - ./gradlew check -Pbuild-plugins=true
    when:
      event: [ push ]
      branch: [ renovate-* ]
